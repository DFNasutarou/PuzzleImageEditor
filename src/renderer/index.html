<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:">
  <title>画像エディター</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>画像エディター</h1>
      <div class="undo-redo">
        <button id="undoBtn" class="btn btn-secondary btn-sm">Undo</button>
        <button id="redoBtn" class="btn btn-secondary btn-sm">Redo</button>
      </div>
    </div>
    <div id="cell-pos-bar">
      <span>配置セル: 行 <span id="selectedRow">-</span> / 列 <span id="selectedCol">-</span></span>
      <button id="toggleGridBtn" class="btn btn-secondary btn-sm">グリッド非表示</button>
    </div>
    <div class="sidebar-body">
      <nav id="tool-nav">
        <button class="tool-nav-btn active" data-panel="grid">グリッド</button>
        <button class="tool-nav-btn" data-panel="text">テキスト</button>
        <button class="tool-nav-btn" data-panel="shape">図形</button>
        <button class="tool-nav-btn" data-panel="image">画像</button>
        <button class="tool-nav-btn" data-panel="layer">レイヤー</button>
        <button class="tool-nav-btn" data-panel="template">テンプレ</button>
        <button class="tool-nav-btn" data-panel="maze">迷路</button>
      </nav>
      <div id="tool-panels">

        <div class="tool-panel active" id="tool-panel-grid">
          <h2>グリッド設定</h2>
          <div class="form-row">
            <label for="canvasWidth">幅(px)</label>
            <input type="number" id="canvasWidth" value="960" min="100" max="3000">
          </div>
          <div class="form-row">
            <label for="canvasHeight">高さ(px)</label>
            <input type="number" id="canvasHeight" value="540" min="100" max="3000">
          </div>
          <div class="form-row">
            <label for="gridBgColor">背景色</label>
            <input type="color" id="gridBgColor" value="#ffffff">
          </div>
          <div class="form-row">
            <label for="gridLineColor">グリッド線色</label>
            <input type="color" id="gridLineColor" value="#cccccc">
          </div>
        </div>

        <div class="tool-panel" id="tool-panel-text">
          <h2>テキスト配置</h2>
          <p class="hint-text">キャンバスをクリックしてセルを選択してから追加します</p>
          <div class="form-row">
            <textarea id="textInput" placeholder="複数文字は右へ連続配置" rows="2"></textarea>
          </div>
          <div class="form-row">
            <label for="fontFamily">フォント</label>
            <select id="fontFamily"></select>
          </div>
          <div class="form-row">
            <label for="textColor">文字色</label>
            <input type="color" id="textColor" value="#000000">
          </div>
          <button id="addTextBtn" class="btn btn-primary btn-sm">テキストを追加</button>
        </div>

        <div class="tool-panel" id="tool-panel-shape">
          <h2>図形配置</h2>
          <p class="hint-text">キャンバスをクリックしてセルを選択してから追加します</p>
          <div class="form-row">
            <label for="shapeName">図形</label>
            <select id="shapeName"></select>
          </div>
          <div class="form-row">
            <label for="shapeFill">塗り色</label>
            <div class="color-with-none">
              <input type="color" id="shapeFill" value="#4a90d9">
              <label class="checkbox-label"><input type="checkbox" id="shapeFillNone"> 透過</label>
            </div>
          </div>
          <div class="form-row">
            <label for="shapeStroke">枠線色</label>
            <input type="color" id="shapeStroke" value="#2c5f8a">
          </div>
          <button id="addShapeBtn" class="btn btn-primary btn-sm">図形を追加</button>
        </div>

        <div class="tool-panel" id="tool-panel-image">
          <h2>画像配置</h2>
          <p class="hint-text">キャンバスをクリックしてセルを選択してから追加します</p>
          <div class="form-row">
            <label for="imageFile">画像ファイル</label>
            <input type="file" id="imageFile" accept="image/*">
          </div>
          <div class="form-row">
            <label for="imageOpacity">不透明度</label>
            <input type="range" id="imageOpacity" value="1" min="0" max="1" step="0.1">
            <span id="opacityValue">100%</span>
          </div>
        </div>

        <div class="tool-panel" id="tool-panel-layer">
          <h2>レイヤーのグリッド</h2>
          <div class="form-row">
            <label for="layerCellSize">セルサイズ(px)</label>
            <input type="number" id="layerCellSize" value="60" min="10" max="200">
          </div>
          <div class="form-row">
            <label for="layerOffsetX">オフセットX</label>
            <input type="number" id="layerOffsetX" value="0">
          </div>
          <div class="form-row">
            <label for="layerOffsetY">オフセットY</label>
            <input type="number" id="layerOffsetY" value="0">
          </div>
          <h2 style="margin-top:10px">レイヤー</h2>
          <button id="addLayerBtn" class="btn btn-secondary btn-sm">＋ レイヤー追加</button>
          <div id="layerList"></div>
        </div>

        <div class="tool-panel" id="tool-panel-template">
          <h2>テンプレート</h2>
          <div id="templateList"></div>
        </div>

        <div class="tool-panel" id="tool-panel-maze">
          <h2>迷路モード</h2>
          <p class="hint-text">グリッドの境界線をクリック・ドラッグして壁を引きます。再クリックで消去します。</p>
          <p class="hint-text" style="margin-top:8px">他のツールを選択すると通常モードに戻ります。</p>
        </div>

      </div>
    </div>
  </div>

  <div id="mainArea">
    <!-- CHG_001: ツールバー -->
    <div id="toolbar">
      <select id="dpiSelect" class="btn-sm">
        <option value="72">72dpi</option>
        <option value="96" selected>96dpi</option>
        <option value="150">150dpi</option>
        <option value="300">300dpi</option>
      </select>
      <button id="savePngBtn" class="btn btn-primary btn-sm">PNG保存</button>
      <button id="saveSvgBtn" class="btn btn-secondary btn-sm">SVG保存</button>
      <span class="toolbar-separator">|</span>
      <button id="saveProjectBtn" class="btn btn-secondary btn-sm">プロジェクト保存</button>
      <button id="openProjectBtn" class="btn btn-secondary btn-sm">プロジェクトを開く</button>
    </div>

    <div id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="../../node_modules/fabric/dist/index.js"></script>
  <script src="grid/editorUndoManager.js"></script>
  <script src="grid/elementPlacer.js"></script>
  <script src="grid/mazeDrawer.js"></script>
  <script src="library/elementCatalog.js"></script>
  <script src="library/layerManager.js"></script>
  <script src="grid/gridCanvas.js"></script>
  <script src="export/pngExporter.js"></script>
  <script src="export/svgExporter.js"></script>
  <script src="template/builtinTemplates.js"></script>
  <script src="template/templateLoader.js"></script>
  <script src="app.js"></script>

  <script>
    document.getElementById('imageOpacity')?.addEventListener('input', e => {
      document.getElementById('opacityValue').textContent = Math.round(e.target.value * 100) + '%'
    })
  </script>
</body>
</html>
